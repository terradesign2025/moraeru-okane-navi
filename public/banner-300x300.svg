<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300">
  <defs>
    <linearGradient id="bg300" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f2240;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="amber300" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="300" height="300" rx="12" fill="url(#bg300)" />

  <!-- 装飾：右上の光 -->
  <circle cx="280" cy="30" r="60" fill="#f59e0b" opacity="0.07" />
  <circle cx="30" cy="270" r="80" fill="#3b82f6" opacity="0.06" />

  <!-- トップバー -->
  <rect x="0" y="0" width="300" height="6" rx="3" fill="url(#amber300)" />

  <!-- コインアイコン大 -->
  <circle cx="150" cy="90" r="50" fill="#f59e0b" opacity="0.12" />
  <circle cx="150" cy="90" r="36" fill="#f59e0b" opacity="0.18" />
  <text x="150" y="103" font-family="Arial, sans-serif" font-size="44" text-anchor="middle">💰</text>

  <!-- ロゴ名 -->
  <text x="150" y="160" font-family="'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif" font-size="22" font-weight="900" text-anchor="middle" fill="#ffffff">もらえるお金ナビ</text>

  <!-- キャッチコピー 1行目 -->
  <text x="150" y="188" font-family="'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif" font-size="13" font-weight="400" text-anchor="middle" fill="#cbd5e1">知らないと損！</text>

  <!-- キャッチコピー 2行目 -->
  <text x="150" y="207" font-family="'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif" font-size="13" font-weight="400" text-anchor="middle" fill="#cbd5e1">補助金・給付金を無料で検索</text>

  <!-- CTAボタン -->
  <rect x="40" y="228" width="220" height="44" rx="22" fill="url(#amber300)" />
  <text x="150" y="255" font-family="'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif" font-size="15" font-weight="900" text-anchor="middle" fill="#1e3a5f">今すぐ無料で検索する →</text>

  <!-- URL -->
  <text x="150" y="288" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#64748b">moraeru-okane.jp</text>

  <!-- 枠線 -->
  <rect width="300" height="300" rx="12" fill="none" stroke="#2d4a6e" stroke-width="1.5" />
</svg>
