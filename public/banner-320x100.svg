<svg xmlns="http://www.w3.org/2000/svg" width="320" height="100" viewBox="0 0 320 100">
  <defs>
    <linearGradient id="bg320" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f2240;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="amber320" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="320" height="100" rx="8" fill="url(#bg320)" />

  <!-- 左アクセントライン -->
  <rect x="0" y="0" width="5" height="100" rx="2.5" fill="url(#amber320)" />

  <!-- 装飾サークル -->
  <circle cx="48" cy="50" r="30" fill="#f59e0b" opacity="0.12" />

  <!-- コインアイコン -->
  <text x="48" y="59" font-family="Arial, sans-serif" font-size="28" text-anchor="middle">💰</text>

  <!-- サービス名 -->
  <text x="90" y="38" font-family="'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif" font-size="17" font-weight="900" fill="#ffffff">もらえるお金ナビ</text>

  <!-- キャッチコピー -->
  <text x="90" y="58" font-family="'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif" font-size="11.5" font-weight="400" fill="#cbd5e1">補助金・給付金を無料で検索</text>

  <!-- URL -->
  <text x="90" y="76" font-family="Arial, sans-serif" font-size="10" fill="#64748b">moraeru-okane.jp</text>

  <!-- CTAボタン -->
  <rect x="210" y="28" width="96" height="44" rx="6" fill="url(#amber320)" />
  <text x="258" y="47" font-family="'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif" font-size="11" font-weight="900" text-anchor="middle" fill="#1e3a5f">無料で</text>
  <text x="258" y="62" font-family="'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif" font-size="11" font-weight="900" text-anchor="middle" fill="#1e3a5f">検索する →</text>

  <!-- 枠線 -->
  <rect width="320" height="100" rx="8" fill="none" stroke="#2d4a6e" stroke-width="1" />
</svg>
