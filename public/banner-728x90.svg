<svg xmlns="http://www.w3.org/2000/svg" width="728" height="90" viewBox="0 0 728 90">
  <defs>
    <linearGradient id="bg728" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f2240;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shine728" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.06" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="728" height="90" rx="8" fill="url(#bg728)" />
  <rect width="728" height="90" rx="8" fill="url(#shine728)" />

  <!-- 左アクセントライン -->
  <rect x="0" y="0" width="6" height="90" rx="3" fill="#f59e0b" />

  <!-- コインアイコン背景円 -->
  <circle cx="52" cy="45" r="28" fill="#f59e0b" opacity="0.15" />
  <circle cx="52" cy="45" r="20" fill="#f59e0b" opacity="0.25" />

  <!-- コインテキスト -->
  <text x="52" y="51" font-family="Arial, sans-serif" font-size="22" font-weight="900" text-anchor="middle" fill="#f59e0b">💰</text>

  <!-- ロゴ・メインテキスト -->
  <text x="95" y="36" font-family="'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif" font-size="20" font-weight="900" fill="#ffffff">もらえるお金ナビ</text>

  <!-- キャッチコピー -->
  <text x="95" y="60" font-family="'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif" font-size="13" font-weight="400" fill="#cbd5e1">知らないと損！補助金・給付金を無料で検索</text>

  <!-- URL表示 -->
  <text x="95" y="78" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">moraeru-okane.jp</text>

  <!-- 区切り線 -->
  <line x1="560" y1="18" x2="560" y2="72" stroke="#334155" stroke-width="1" />

  <!-- CTAボタン -->
  <rect x="578" y="22" width="132" height="46" rx="6" fill="#f59e0b" />
  <text x="644" y="40" font-family="'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif" font-size="12" font-weight="900" text-anchor="middle" fill="#1e3a5f">補助金を</text>
  <text x="644" y="57" font-family="'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif" font-size="12" font-weight="900" text-anchor="middle" fill="#1e3a5f">無料で検索 →</text>

  <!-- 枠線 -->
  <rect width="728" height="90" rx="8" fill="none" stroke="#2d4a6e" stroke-width="1" />
</svg>
